<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Submarine Catalyst</title>
<meta name="description" content="Sign in to your Submarine Catalyst account. Access PDUFA scanner, biotech catalyst scores, and AI research tools.">
<meta name="twitter:site" content="@DRackler">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  :root {
    --navy:    #040d1a;
    --deep:    #07152b;
    --surface: #0b1f3a;
    --panel:   #0f2647;
    --border:  #1a3a5c;
    --accent:  #00d4ff;
    --accent2: #00ff9d;
    --amber:   #f5a623;
    --red:     #ff4444;
    --text:    #c8dff0;
    --muted:   #5a7a99;
    --white:   #eaf4ff;
    --mono:    'Space Mono', monospace;
    --serif:   'DM Serif Display', serif;
    --sans:    'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--navy); color: var(--text); font-family: var(--sans); font-size: 16px; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  nav, main, footer { position: relative; z-index: 1; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 3rem; border-bottom: 1px solid var(--border); background: rgba(4,13,26,0.85); backdrop-filter: blur(12px); }
  .nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
  .sonar-icon { width: 32px; height: 32px; }
  .sonar-icon svg { width: 100%; height: 100%; }
  .nav-wordmark { font-family: var(--mono); font-size: 0.85rem; font-weight: 700; color: var(--white); letter-spacing: 0.12em; text-transform: uppercase; }
  .nav-wordmark span { color: var(--accent); }
  .nav-right { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.08em; color: var(--muted); }
  .nav-right a { color: var(--accent); text-decoration: none; }
  .nav-right a:hover { text-decoration: underline; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 2rem; }
  .auth-container { width: 100%; max-width: 420px; animation: fadeUp 0.6s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .auth-eyebrow { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.75rem; }
  .auth-eyebrow::before { content: ''; display: block; width: 1.5rem; height: 1px; background: var(--accent); }
  .auth-heading { font-family: var(--serif); font-size: 2.2rem; color: var(--white); margin-bottom: 0.4rem; line-height: 1.15; }
  .auth-sub { font-size: 0.9rem; color: var(--muted); font-weight: 300; margin-bottom: 2.5rem; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); padding: 2rem; position: relative; overflow: hidden; }
  .auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .form-group { margin-bottom: 1.25rem; }
  .form-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
  .form-label { display: block; font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .form-caps-warn { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.08em; color: var(--amber); display: none; align-items: center; gap: 0.3rem; }
  .form-caps-warn.visible { display: inline-flex; }
  .input-wrap { position: relative; }
  .form-input { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--white); font-family: var(--mono); font-size: 0.85rem; padding: 0.75rem 1rem; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  .form-input.password { padding-right: 3rem; }
  .form-input::placeholder { color: var(--muted); }
  .form-input:focus { border-color: var(--accent); }
  .show-pw-btn { position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.08em; padding: 0.3rem 0.5rem; transition: color 0.15s; }
  .show-pw-btn:hover { color: var(--accent); }
  .form-footer { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; min-height: 1.4rem; }
  .form-forgot { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.06em; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .form-forgot:hover { color: var(--accent); }
  .form-forgot.elevated { color: var(--accent); font-weight: 700; text-decoration: underline; }
  .btn-submit { display: block; width: 100%; font-family: var(--mono); font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; background: var(--accent); color: var(--navy); border: none; padding: 0.9rem; cursor: pointer; font-weight: 700; transition: opacity 0.2s; clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
  .btn-submit:hover { opacity: 0.85; }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-resend { display: inline-block; margin-top: 0.5rem; font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.08em; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 0.4rem 0.85rem; cursor: pointer; transition: all 0.15s; }
  .btn-resend:hover { background: var(--accent); color: var(--navy); }
  .btn-resend:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
  .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .auth-divider span { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .auth-switch { text-align: center; font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.06em; color: var(--muted); }
  .auth-switch a { color: var(--accent); text-decoration: none; }
  .auth-switch a:hover { text-decoration: underline; }
  .error-box { background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.3); color: var(--red); font-family: var(--mono); font-size: 0.72rem; padding: 0.75rem 1rem; margin-bottom: 1.25rem; display: none; letter-spacing: 0.04em; line-height: 1.5; }
  .error-box.visible { display: block; }
  .error-box.amber { background: rgba(245,166,35,0.08); border-color: rgba(245,166,35,0.3); color: var(--amber); }
  .info-box { background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.25); color: var(--accent); font-family: var(--mono); font-size: 0.72rem; padding: 0.75rem 1rem; margin-bottom: 1.25rem; display: none; letter-spacing: 0.04em; line-height: 1.5; }
  .info-box.visible { display: block; }
  .info-box.green { background: rgba(0,255,157,0.05); border-color: rgba(0,255,157,0.3); color: var(--accent2); }
  footer { border-top: 1px solid var(--border); padding: 1.25rem 3rem; display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.08em; color: var(--muted); background: var(--deep); }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }
  .footer-links { display: flex; gap: 1.5rem; }
  @media (max-width: 640px) {
    nav { padding: 1rem 1.25rem; }
    footer { padding: 1rem 1.25rem; flex-direction: column; gap: 0.75rem; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div class="sonar-icon">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Submarine Catalyst sonar icon">
        <circle cx="16" cy="16" r="15" stroke="#1a3a5c" stroke-width="1"/>
        <circle cx="16" cy="16" r="10" stroke="#1a3a5c" stroke-width="0.75"/>
        <circle cx="16" cy="16" r="5"  stroke="#1a3a5c" stroke-width="0.75"/>
        <circle cx="16" cy="16" r="2"  fill="#00d4ff"/>
        <line x1="16" y1="16" x2="24" y2="4" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="24" cy="4" r="1.5" fill="#00ff9d">
          <animate attributeName="opacity" values="1;0;1" dur="1.8s" repeatCount="indefinite"/>
        </circle>
        <path d="M16 16 A10 10 0 0 1 26 16" stroke="#00d4ff" stroke-width="0.75" opacity="0.3">
          <animateTransform attributeName="transform" type="rotate" from="0 16 16" to="360 16 16" dur="3s" repeatCount="indefinite"/>
        </path>
      </svg>
    </div>
    <span class="nav-wordmark">SUBMARINE<span>CATALYST</span></span>
  </a>
  <span class="nav-right">No account? <a href="/signup.html">Create one →</a></span>
</nav>

<main>
  <div class="auth-container">
    <div class="auth-eyebrow">Secure Access</div>
    <h1 class="auth-heading">Sign in to<br>your account.</h1>
    <p class="auth-sub">Access your PDUFA scanner, watchlist, and alerts.</p>

    <div class="auth-card">
      <div class="error-box" id="error-box">
        <div id="error-text"></div>
        <button type="button" class="btn-resend" id="resend-btn" style="display:none;">↻ Resend confirmation email</button>
      </div>
      <div class="info-box" id="info-box"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" name="email"
                 placeholder="you@example.com" autocomplete="email"
                 inputmode="email" autocapitalize="off" autocorrect="off"
                 spellcheck="false" required />
        </div>
        <div class="form-group">
          <div class="form-label-row">
            <label class="form-label" for="password">Password</label>
            <span class="form-caps-warn" id="caps-warn">⚠ Caps Lock is on</span>
          </div>
          <div class="input-wrap">
            <input class="form-input password" type="password" id="password" name="password"
                   placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="show-pw-btn" id="show-pw-btn" aria-label="Show password">SHOW</button>
          </div>
        </div>
        <div class="form-footer">
          <span></span>
          <a href="/forgot-password.html" class="form-forgot" id="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
      </form>

      <div class="auth-divider"><span>or</span></div>
      <div class="auth-switch">Don't have an account? <a href="/signup.html">Subscribe now →</a></div>
    </div>
  </div>
</main>

<footer>
  <a href="/" style="font-weight:700;letter-spacing:0.12em;">SUBMARINE CATALYST</a>
  <div class="footer-links">
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
  </div>
</footer>

<script>
  const errorBox   = document.getElementById('error-box');
  const errorText  = document.getElementById('error-text');
  const infoBox    = document.getElementById('info-box');
  const submitBtn  = document.getElementById('submit-btn');
  const emailInput = document.getElementById('email');
  const passInput  = document.getElementById('password');
  const showPwBtn  = document.getElementById('show-pw-btn');
  const capsWarn   = document.getElementById('caps-warn');
  const forgotLink = document.getElementById('forgot-link');
  const resendBtn  = document.getElementById('resend-btn');

  // ─── Display helpers ───────────────────────────────────────────────────
  function showError(msg, opts) {
    opts = opts || {};
    errorText.textContent = msg;
    errorBox.classList.add('visible');
    errorBox.classList.toggle('amber', !!opts.amber);
    infoBox.classList.remove('visible');
    resendBtn.style.display = opts.showResend ? 'inline-block' : 'none';
    if (opts.elevateForgot) forgotLink.classList.add('elevated');
  }
  function showInfo(msg, opts) {
    opts = opts || {};
    infoBox.textContent = msg;
    infoBox.classList.add('visible');
    infoBox.classList.toggle('green', !!opts.green);
    errorBox.classList.remove('visible');
    resendBtn.style.display = 'none';
  }
  function clearMessages() {
    errorBox.classList.remove('visible');
    infoBox.classList.remove('visible');
    resendBtn.style.display = 'none';
    forgotLink.classList.remove('elevated');
  }
  function resetBtn() {
    submitBtn.textContent = 'Sign In';
    submitBtn.disabled = false;
    submitBtn.style.opacity = '1';
  }

  // ─── Show/hide password ────────────────────────────────────────────────
  showPwBtn.addEventListener('click', function() {
    if (passInput.type === 'password') {
      passInput.type = 'text';
      showPwBtn.textContent = 'HIDE';
      showPwBtn.setAttribute('aria-label', 'Hide password');
    } else {
      passInput.type = 'password';
      showPwBtn.textContent = 'SHOW';
      showPwBtn.setAttribute('aria-label', 'Show password');
    }
    passInput.focus();
  });

  // ─── Caps Lock detection ───────────────────────────────────────────────
  // Listen on both inputs because some browsers only fire keydown when
  // focus is on a field. We only display the warning when the password
  // field is active to avoid alarming users typing their email.
  function checkCaps(e) {
    if (typeof e.getModifierState !== 'function') return;
    const on = e.getModifierState('CapsLock');
    if (on && document.activeElement === passInput) {
      capsWarn.classList.add('visible');
    } else {
      capsWarn.classList.remove('visible');
    }
  }
  passInput.addEventListener('keydown', checkCaps);
  passInput.addEventListener('keyup', checkCaps);
  passInput.addEventListener('blur', () => capsWarn.classList.remove('visible'));

  // ─── Auto-focus email field on load ────────────────────────────────────
  // Skip auto-focus if there's a value (e.g. browser autofilled) — let the
  // user see what was prefilled before we steal focus.
  window.addEventListener('load', function() {
    setTimeout(function() {
      if (!emailInput.value) emailInput.focus();
    }, 100);
  });

  // ─── Granular Supabase error mapping ───────────────────────────────────
  // Supabase generic "Invalid login credentials" doesn't tell users if
  // the email or the password is wrong (intentional, prevents enumeration).
  // We still surface friendlier messaging for the cases we CAN detect.
  function mapSupabaseError(err) {
    const msg = String(err?.message || err || '').toLowerCase();
    const status = err?.status || 0;

    if (msg.includes('email not confirmed') || msg.includes('not confirmed') || msg.includes('email_not_confirmed')) {
      return {
        text: 'Your email isn\'t confirmed yet. Check your inbox for the confirmation link, or click below to resend.',
        showResend: true,
        amber: true,
      };
    }
    if (msg.includes('invalid login credentials') || msg.includes('invalid_credentials') || msg.includes('invalid email or password')) {
      return {
        text: 'Wrong email or password. If you forgot it, click "Forgot password?" to reset.',
        elevateForgot: true,
      };
    }
    if (msg.includes('rate limit') || msg.includes('too many') || status === 429) {
      return {
        text: 'Too many sign-in attempts. Wait 60 seconds and try again, or reset your password.',
        amber: true,
        elevateForgot: true,
      };
    }
    if (msg.includes('user not found') || msg.includes('no user')) {
      return {
        text: 'No account found with that email. Want to create one?',
        amber: true,
      };
    }
    if (msg.includes('network') || msg.includes('failed to fetch')) {
      return {
        text: 'Cannot reach the authentication server. Your Supabase project may be paused — try again in a few seconds.',
      };
    }
    if (msg === 'timeout') {
      return {
        text: 'Authentication timed out after 15 seconds. Supabase may be warming up — wait 30 seconds and try again.',
      };
    }
    return { text: err?.message || 'Sign-in failed. Please try again.' };
  }

  // ─── Resend confirmation email ─────────────────────────────────────────
  resendBtn.addEventListener('click', async function() {
    const email = emailInput.value.trim();
    if (!email) {
      showError('Enter your email above first, then click Resend.');
      return;
    }
    const sb = (typeof getSupabase === 'function') ? getSupabase() : null;
    if (!sb) {
      showError('Service unavailable. Refresh the page and try again.');
      return;
    }
    resendBtn.disabled = true;
    resendBtn.textContent = 'Sending...';
    try {
      const { error } = await sb.auth.resend({ type: 'signup', email });
      if (error) throw error;
      showInfo('Confirmation email sent. Check your inbox (and spam folder).', { green: true });
    } catch (err) {
      showError('Could not resend: ' + (err.message || 'unknown error'));
    } finally {
      setTimeout(function() {
        resendBtn.disabled = false;
        resendBtn.textContent = '↻ Resend confirmation email';
      }, 3000);
    }
  });

  // ─── Session-persistence poll (preserved from previous version) ────────
  // signInWithPassword can resolve before localStorage is written. If we
  // navigate before that, the dashboard auth guard sees no session and
  // bounces back here. Poll up to 3s before navigating.
  async function waitForSessionAndRedirect(sb, destination) {
    for (let i = 0; i < 30; i++) {
      try {
        const { data } = await sb.auth.getSession();
        if (data?.session?.access_token) {
          window.location.href = destination;
          return true;
        }
      } catch (e) { /* keep polling */ }
      await new Promise(r => setTimeout(r, 100));
    }
    return false;
  }

  // ─── Already-signed-in auto-redirect ───────────────────────────────────
  if (typeof scGetSession === 'function') {
    scGetSession()
      .then(session => {
        if (session) {
          showInfo('Already signed in — redirecting to dashboard…');
          window.location.href = '/dashboard.html';
        }
      })
      .catch(err => console.warn('[SC Login] session check error:', err));
  }

  // ─── Submit handler ────────────────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    clearMessages();

    const email    = emailInput.value.trim();
    const password = passInput.value;

    if (!email || !password) {
      showError('Email and password required.');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('That doesn\'t look like a valid email. Check for typos.');
      emailInput.focus();
      return;
    }

    submitBtn.textContent = 'Signing in...';
    submitBtn.disabled    = true;
    submitBtn.style.opacity = '0.7';

    const sb = (typeof getSupabase === 'function') ? getSupabase() : null;
    if (!sb) {
      showError('Service unavailable. Please refresh the page and try again.');
      resetBtn();
      return;
    }

    const timeout = new Promise((_, reject) =>
      setTimeout(() => reject(new Error('timeout')), 15000)
    );

    try {
      const result = await Promise.race([
        sb.auth.signInWithPassword({ email, password }),
        timeout,
      ]);
      const { data, error } = result;

      if (error) {
        const mapped = mapSupabaseError(error);
        showError(mapped.text, mapped);
        // Clear password + refocus on it after a credential error.
        if (/wrong email|invalid|rate limit/i.test(mapped.text)) {
          passInput.value = '';
          passInput.focus();
        }
        resetBtn();
        return;
      }
      if (!data?.session) {
        showError('Sign-in succeeded but no session returned. Please try again.');
        resetBtn();
        return;
      }

      submitBtn.textContent = 'Loading dashboard...';
      const ok = await waitForSessionAndRedirect(sb, '/dashboard.html');
      if (!ok) {
        showError('Signed in, but session did not persist. Try clearing cookies, disabling browser extensions that block cookies, or switching browsers.');
        resetBtn();
      }
    } catch (err) {
      const mapped = mapSupabaseError(err);
      showError(mapped.text, mapped);
      resetBtn();
    }
  });
</script>
</body>
</html>
